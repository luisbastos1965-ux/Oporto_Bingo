<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oporto Bin'Go</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="./bingo-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <video id="splash-video" autoplay muted playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div id="lang-selector" class="lang-flags">
            <button onclick="changeLanguage('pt')" class="flag-btn" data-lang="pt">🇵🇹</button>
            <button onclick="changeLanguage('en')" class="flag-btn" data-lang="en">🇬🇧</button>
            <button onclick="changeLanguage('es')" class="flag-btn" data-lang="es">🇪🇸</button>
            <button onclick="changeLanguage('fr')" class="flag-btn" data-lang="fr">🇫🇷</button>
            <button onclick="changeLanguage('de')" class="flag-btn" data-lang="de">🇩🇪</button>
            <button onclick="changeLanguage('it')" class="flag-btn" data-lang="it">🇮🇹</button>
            <button onclick="changeLanguage('zh')" class="flag-btn" data-lang="zh">🇨🇳</button>
        </div>
        <h1>OPORTO</h1>
    </header>

    <main>
        <div id="bingo-grid" class="grid"></div>
    </main>

    <footer>
        <h2>Bin'Go</h2>
    </footer>

    <audio id="unlock-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="location-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close">×</span>
            <h2 id="modal-title">Título</h2>
            <img id="modal-image" src="" alt="Local">
            
            <div id="modal-actions" class="actions-bar">
                <button id="btn-map" class="action-btn" onclick="openMap()">📍 Como Chegar</button>
                <button id="btn-audio" class="action-btn hidden" onclick="toggleAudio()">🔊 Ouvir Textos</button>
                <button id="btn-share" class="action-btn hidden" onclick="shareLocation()">📲 Partilhar</button>
            </div>

            <div id="modal-tabs" class="tabs">
                <button id="tab-btn-resumo" class="tab-btn active" onclick="openTab(event, 'tab-resumo')">Resumo</button>
                <button id="tab-btn-historia" class="tab-btn" onclick="openTab(event, 'tab-historia')">História</button>
                <button id="tab-btn-curiosidades" class="tab-btn" onclick="openTab(event, 'tab-curiosidades')">Curiosidades</button>
            </div>

            <div id="tab-resumo" class="tab-content active">
                <p id="modal-desc"></p>
            </div>
            <div id="tab-historia" class="tab-content">
                <p id="modal-hist"></p>
            </div>
            <div id="tab-curiosidades" class="tab-content">
                <p id="modal-curio"></p>
            </div>
        </div>
    </div>

    <script src="sw.js"></script>
    <script src="app.js"></script>
</body>
</html>
